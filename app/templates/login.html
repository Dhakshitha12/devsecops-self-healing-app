<!DOCTYPE html>
<html>

<head>

<title>Incident Reporting System</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:300px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
}

button{
width:100%;
padding:10px;
background:#007BFF;
color:white;
border:none;
cursor:pointer;
}

.error{
color:red;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Security System Login</h2>

<form method="post">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

</div>

</body>

</html>
